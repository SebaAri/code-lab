<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <title>Perfil</title>

  <style>
    body {
      padding-top: 70px;
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">DataLog Control</a>
  </div>
</nav>

<div class="container mt-4">

  <div class="row">

    <!-- PERFIL -->
    <div class="col-md-4">
      <div class="card text-center p-4 shadow-sm">
        <img src="https://via.placeholder.com/120" class="rounded-circle mx-auto mb-3">
        <h4>Ariel R. Sebastian</h4>
        <p class="text-muted">Data Scientist</p>
        <p><strong>Email:</strong>ariel@email.com</p>
      </div>
    </div>

    <!-- DETALLES -->
    <div class="col-md-8">

      <!-- ACTIVIDAD -->
      <div class="card p-4 shadow-sm mb-4">
        <h5>Resumen de actividad</h5>
        <ul class="list-group list-group-flush">
          <li class="list-group-item">Datos procesados: 1,250</li>
          <li class="list-group-item">Validaciones realizadas: 980</li>
          <li class="list-group-item">Errores detectados: 270</li>
        </ul>
      </div>

      <!-- CONFIGURACIÓN -->
      <div class="card p-4 shadow-sm mb-4">
        <h5>Configuración</h5>

        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" value="Ariel R. Sebastian">
        </div>

        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="email" class="form-control" value="arieln@email.com">
        </div>

        <button class="btn btn-primary">Guardar cambios</button>
      </div>

      <!-- ACCIONES -->
      <div class="card p-4 shadow-sm">
        <h5>Acciones rápidas</h5>
        <a href="dashboard.html" class="btn btn-outline-primary me-2">Ir al Dashboard</a>
        <button class="btn btn-outline-success">Cargar Datos</button>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
