<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <title>Contacto - DataLog Control</title>

  <style>
    body {
      padding-top: 70px;
    }
  </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">

    <!-- Marca -->
    <a class="navbar-brand fw-bold" href="#">DataLog Control</a>

    <!-- Botón hamburguesa -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Contenido colapsable -->
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Menú -->
      <div class="ms-auto d-flex gap-2">
        <a href="dashboard.html" class="btn btn-outline-light">Dashboard</a>
        <a href="services.html" class="btn btn-outline-light">Servicios</a>
        <a href="index.html" class="btn btn-outline-light">Inicio</a>
      </div>

    </div>

  </div>
</nav>

<!-- FORMULARIO -->
<section class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Contacto</h2>

        <form>

          <!-- Nombre -->
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Tu nombre" required>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" placeholder="ejemplo@mail.com" required>
          </div>

          <!-- Asunto -->
          <div class="mb-3">
            <label class="form-label">Asunto</label>
            <input type="text" class="form-control" placeholder="Motivo del mensaje" required>
          </div>

          <!-- Mensaje -->
          <div class="mb-3">
            <label class="form-label">Mensaje</label>
            <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje..." required></textarea>
          </div>

          <!-- Botón -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              Enviar mensaje
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</section>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
