<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <title>Dashboard - DataLog Control</title>

  <style>
    body {
      padding-top: 70px;
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">DataLog Control</a>
    

    <div class="d-flex gap-2 ms-auto">
      <a href="index.html" class="btn btn-outline-light">Inicio</a>
      <a href="perfil.html" class="btn btn-outline-light">Perfil</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- KPIs -->
  <div class="row text-center mb-4">

    <div class="col-md-3">
      <div class="card p-3 shadow-sm">
        <h6>Total Datos</h6>
        <h3>1,250</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm">
        <h6>Validaciones OK</h6>
        <h3 class="text-success">980</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm">
        <h6>Errores</h6>
        <h3 class="text-danger">270</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm">
        <h6>Rendimiento</h6>
        <h3>78%</h3>
      </div>
    </div>

  </div>

  <!-- GRÁFICO -->
  <div class="card p-4 shadow-sm mb-4">
    <h5 class="mb-3">Procesamiento de Datos</h5>
    <canvas id="miGrafico"></canvas>
  </div>

  <!-- ACCIONES -->
  <div class="mb-4">
    <button class="btn btn-primary">Cargar Datos</button>
    <button class="btn btn-success">Validar</button>
    <button class="btn btn-danger">Eliminar</button>
  </div>

  <!-- TABLA -->
  <div class="card p-4 shadow-sm">
    <h5 class="mb-3">Últimos Registros</h5>

    <div class="table-responsive">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Resultado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#001</td>
            <td><span class="badge bg-success">OK</span></td>
            <td>26/04/2026</td>
            <td>Validado</td>
          </tr>
          <tr>
            <td>#002</td>
            <td><span class="badge bg-danger">Error</span></td>
            <td>26/04/2026</td>
            <td>Falla de datos</td>
          </tr>
          <tr>
            <td>#003</td>
            <td><span class="badge bg-success">OK</span></td>
            <td>25/04/2026</td>
            <td>Validado</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT GRÁFICO -->
<script>
  const ctx = document.getElementById('miGrafico');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie'],
      datasets: [{
        label: 'Datos procesados',
        data: [120, 190, 300, 250, 320],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true
    }
  });
</script>

</body>
</html>
